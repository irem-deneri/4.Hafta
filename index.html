<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İrem Deneri Portfolyo</title>
    <style>
        /* Hareketli Renkli Arka Plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #FF3CAC, #784BA0, #2B86C5, #00DBDE);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cam Efekti Kart */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 40px 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: white;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { margin-bottom: 25px; opacity: 0.9; font-size: 14px; }

        /* Butonlar */
        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            color: #333;
            background: white;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="ekran.jpeg" alt="Profil" class="profile-img">
        <h1>İrem Deneri</h1>
        <p>4. Hafta Proje Çalışmaları</p>

        <a href="makyaj_stili.html" class="btn">✨ Uygulamayı Başlat</a>
        <a href="can_egrisi_grafigi.png" target="_blank" class="btn">📊 Analiz Grafiği</a>
        <a href="makyaj_verisi.csv" target="_blank" class="btn">📂 Veri Seti (CSV)</a>
    </div>

</body>
</html>
