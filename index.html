<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İrem Deneri | Portfolyo</title>
    <style>
        /* Renkli ve Hareketli Arka Plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cam Efekti Kart Tasarımı */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            color: #333;
        }

        /* Profil Fotoğrafı */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: #2c3e50;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
        }

        /* Butonlar */
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: white;
            color: #ff9a9e;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Uygulama butonu için özel renk */
        .btn-app {
            background: #ff6b6b;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="ekran.jpeg" alt="İrem Deneri" class="profile-img">
        
        <h1>İrem Deneri</h1>
        <p>Veri Analizi & Yazılım Portfolyosu</p>

        <div class="link-container">
            <a href="makyaj_stili.html" class="btn btn-app">✨ Uygulamayı Başlat</a>
            
            <a href="can_egrisi_grafigi.png" target="_blank" class="btn">📊 Analiz Grafiğini Gör</a>
            
            <a href="makyaj_verisi.csv" target="_blank" class="btn">📂 Veri Setini (CSV) İncele</a>
        </div>
    </div>

</body>
</html>
